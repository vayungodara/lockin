name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# Cancel in-progress review if a new push arrives
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: ${{ !github.event.pull_request.draft }}

    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          classify_inline_comments: 'true'
          include_fix_links: 'true'
          prompt: |
            Review this pull request exhaustively. Your job is to find every real bug, logic error, security vulnerability, race condition, and edge case that could break in production.

            ## Process
            1. Read the full diff and understand what changed and why.
            2. Trace every changed code path through the codebase — follow imports, check callers, verify data flow end-to-end.
            3. Check each category systematically:
               - Logic errors, off-by-one, null/undefined access, wrong comparisons
               - Security: XSS, injection, auth bypasses, exposed secrets, missing RLS checks
               - Race conditions, stale closures, async bugs, missing await
               - Edge cases: empty arrays, missing data, network failures, concurrent users
               - Supabase: client vs server usage, RLS implications, missing error handling
               - React: missing deps in useEffect, stale state in callbacks, memory leaks
               - CSS: z-index conflicts, overflow issues, dark mode breakage, mobile layout bugs
            4. Verify fixes actually work and don't introduce new issues.
            5. Check what's NOT in the diff — missing migrations, missing test updates, stale imports.

            Post each finding as an inline review comment on the exact line where the issue is.
            Read REVIEW.md and CLAUDE.md for project-specific conventions.
          claude_args: '--model claude-opus-4-6'
