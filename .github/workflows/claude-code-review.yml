name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# Cancel in-progress review if a new push arrives
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: ${{ !github.event.pull_request.draft }}

    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          claude_args: >-
            --model claude-opus-4-6
            --append-system-prompt "REVIEW POLICY: Be exhaustive. Find every real bug, logic error, security vulnerability, race condition, and edge case. False negatives are far worse than false positives. Multi-pass process: (1) Read full diff and understand the change. (2) Trace every changed code path through the codebase — follow imports, check callers, verify data flow end-to-end. (3) Check systematically: logic errors, off-by-one, null/undefined, wrong comparisons, XSS, injection, auth bypasses, exposed secrets, missing RLS checks, race conditions, stale closures, async bugs, missing await, empty arrays, missing data, network failures, concurrent users, Supabase client vs server, React missing deps in useEffect, stale state, memory leaks, CSS z-index conflicts, overflow, dark mode breakage, mobile bugs. (4) Verify fixes actually work and don't introduce new issues. (5) Check what is NOT in the diff — missing migrations, missing test updates, stale imports. Tag severity: Bug (will break production), Issue (incorrect behavior or security concern), Nit (minor, not blocking). Read REVIEW.md and CLAUDE.md for project conventions."
